<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROLA-IP</title>
  <link rel="stylesheet" href="premium-styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000 !important; overflow: hidden; }
    body::before, body::after { display: none !important; }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div data-site-nav data-active="home"></div>
  <script src="assets/site-nav.js"></script>
  <canvas id="canvas"></canvas>

  <script type="module">
    import * as THREE from "three";

    function fibonacciSphere(count, radius) {
      const out = new Float32Array(count * 3);
      const phi = Math.PI * (3 - Math.sqrt(5));
      for (let i = 0; i < count; i++) {
        const y = 1 - (i / (count - 1)) * 2;
        const r = Math.sqrt(1 - y * y);
        const theta = phi * i;
        out[i * 3]     = Math.cos(theta) * r * radius;
        out[i * 3 + 1] = y * radius;
        out[i * 3 + 2] = Math.sin(theta) * r * radius;
      }
      return out;
    }

    function easeOutCubic(t) {
      return 1 - (1 - t) ** 3;
    }

    function createCircleTexture() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const c = size / 2;
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(c, c, c, 0, Math.PI * 2);
      ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    const canvas = document.getElementById("canvas");
    const COUNT = 2200;
    const RADIUS = 2;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 7;

    const targetPos = fibonacciSphere(COUNT, RADIUS);

    const startPos = new Float32Array(COUNT * 3);
    for (let i = 0; i < COUNT; i++) {
      const i3 = i * 3;
      const nx = targetPos[i3]     / RADIUS;
      const ny = targetPos[i3 + 1] / RADIUS;
      const nz = targetPos[i3 + 2] / RADIUS;
      const dist = 8 + Math.random() * 10;
      startPos[i3]     = nx * dist;
      startPos[i3 + 1] = ny * dist;
      startPos[i3 + 2] = nz * dist;
    }

    const DRIFT_CHANCE = 0.7;
    const driftActive = new Uint8Array(COUNT);
    const driftPhase  = new Float32Array(COUNT * 3);
    const driftFreq   = new Float32Array(COUNT * 3);
    const driftAmp    = new Float32Array(COUNT);

    for (let i = 0; i < COUNT; i++) {
      driftActive[i] = Math.random() < DRIFT_CHANCE ? 1 : 0;
      for (let j = 0; j < 3; j++) {
        driftPhase[i * 3 + j] = Math.random() * Math.PI * 2;
        driftFreq[i * 3 + j]  = 0.15 + Math.random() * 0.3;
      }
      driftAmp[i] = 0.05 + Math.random() * 0.1;
    }

    const targetAlpha = new Float32Array(COUNT);
    for (let i = 0; i < COUNT; i++) {
      targetAlpha[i] = 0.2 + Math.random() * 0.6;
    }

    const livePos = startPos.slice();
    const geometry = new THREE.BufferGeometry();
    const posAttr = new THREE.BufferAttribute(livePos, 3);
    posAttr.setUsage(THREE.DynamicDrawUsage);
    geometry.setAttribute("position", posAttr);
    geometry.setAttribute("aTargetAlpha", new THREE.BufferAttribute(targetAlpha, 1));

    const circleMap = createCircleTexture();
    const material = new THREE.PointsMaterial({
      map: circleMap,
      color: 0xffffff,
      size: 0.03,
      transparent: true,
      opacity: 0,
      alphaTest: 0.01,
      sizeAttenuation: true,
      depthWrite: false,
    });

    const alphaBlendUniform = { value: 0 };
    material.onBeforeCompile = (shader) => {
      shader.uniforms.uAlphaBlend = alphaBlendUniform;
      shader.vertexShader = shader.vertexShader.replace(
        "void main() {",
        "attribute float aTargetAlpha;\nvarying float vTargetAlpha;\nvoid main() {\n  vTargetAlpha = aTargetAlpha;"
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        "void main() {",
        "uniform float uAlphaBlend;\nvarying float vTargetAlpha;\nvoid main() {"
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        "#include <premultiplied_alpha_fragment>",
        "gl_FragColor.a *= mix(1.0, vTargetAlpha, uAlphaBlend);\n#include <premultiplied_alpha_fragment>"
      );
    };

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const startTime = performance.now();
    const FADE_END   = 0.4;
    const CONV_START = 0.2;
    const CONV_END   = 3.0;
    const ROT_START  = 1.5;
    const INITIAL_Z  = camera.position.z;
    const BASE_SIZE  = 0.03;

    let targetZ   = INITIAL_Z;
    let converged = false;
    let rafId;

    function animate() {
      rafId = requestAnimationFrame(animate);
      const t = (performance.now() - startTime) / 1000;

      material.opacity = Math.min(t / FADE_END, 1) * 0.85;

      const raw = Math.min(Math.max((t - CONV_START) / (CONV_END - CONV_START), 0), 1);
      const p = easeOutCubic(raw);
      const driftWeight = p;

      for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        livePos[i3]     = startPos[i3]     * (1 - p) + targetPos[i3]     * p;
        livePos[i3 + 1] = startPos[i3 + 1] * (1 - p) + targetPos[i3 + 1] * p;
        livePos[i3 + 2] = startPos[i3 + 2] * (1 - p) + targetPos[i3 + 2] * p;
        if (driftActive[i] && driftWeight > 0) {
          const a = driftAmp[i] * driftWeight;
          livePos[i3]     += a * Math.sin(t * driftFreq[i3]     + driftPhase[i3]);
          livePos[i3 + 1] += a * Math.sin(t * driftFreq[i3 + 1] + driftPhase[i3 + 1]);
          livePos[i3 + 2] += a * Math.sin(t * driftFreq[i3 + 2] + driftPhase[i3 + 2]);
        }
      }
      posAttr.needsUpdate = true;

      if (t > ROT_START) {
        const rt = t - ROT_START;
        points.rotation.y = rt * 0.12;
        points.rotation.x = Math.sin(rt * 0.07) * 0.1;
      }

      if (raw >= 1) converged = true;
      if (converged) {
        camera.position.z += (targetZ - camera.position.z) * 0.08;
        material.size = BASE_SIZE * (camera.position.z / INITIAL_Z);

        const MIN_Z = 1.5;
        const blend = camera.position.z <= INITIAL_Z
          ? 1 - (camera.position.z - MIN_Z) / (INITIAL_Z - MIN_Z)
          : 0;
        alphaBlendUniform.value = Math.max(0, Math.min(1, blend));
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    canvas.addEventListener("wheel", (e) => {
      if (!converged) return;
      e.preventDefault();
      targetZ = Math.max(1.5, Math.min(INITIAL_Z, targetZ - e.deltaY * 0.005));
    }, { passive: false });
  </script>

  <script src="assets/site-i18n.js"></script>
  <script>
    (function(){
      var nav = document.getElementById('nav');
      if (nav) {
        var onScroll = function(){ nav.classList.toggle('scrolled', window.scrollY > 12); };
        window.addEventListener('scroll', onScroll, {passive:true});
        onScroll();
      }
      var burger = document.getElementById('hamburger');
      var mnav = document.getElementById('mobileNav');
      if (burger && mnav) {
        burger.addEventListener('click', function(){
          var open = mnav.classList.toggle('open');
          burger.classList.toggle('open', open);
        });
        mnav.querySelectorAll('a').forEach(function(a){
          a.addEventListener('click', function(){
            mnav.classList.remove('open');
            burger.classList.remove('open');
          });
        });
      }
    })();
  </script>
</body>
</html>
