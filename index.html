<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROLA-IP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="premium-styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; height: 100dvh; overflow: hidden; }
    html {
      --home-hero-opacity: 1;
      --home-content-y: 100vh;
    }
    #gl-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: var(--home-hero-opacity);
      transition:
        opacity .12s linear;
      will-change: opacity, filter, transform;
    }
    #gl-container canvas { width: 100% !important; height: 100% !important; }
    .home-content {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transform: translateY(var(--home-content-y));
      will-change: transform;
    }
    .bfs-title { text-align: center; padding: 0 24px; }
    .bfs-title h2 {
      font-size: clamp(2rem, 3.5vw, 2.75rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--color-text-on-dark, #F4F8F5);
      margin-bottom: 16px;
    }
    .bfs-title p {
      font-size: 1.125rem;
      line-height: 1.5;
      color: var(--color-text-on-dark-secondary, #9BA9A3);
    }
    .home-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: var(--home-hero-opacity);
      transition:
        opacity .12s linear;
      background:
        radial-gradient(760px 460px at 82% 12%,
          rgba(26, 215, 159, .09) 0%,
          rgba(26, 215, 159, .04) 38%,
          rgba(26, 215, 159, 0) 72%),
        radial-gradient(130% 96% at 50% 106%,
          rgba(26, 215, 159, .12) 0%,
          rgba(26, 215, 159, .07) 26%,
          rgba(8, 58, 40, .09) 48%,
          rgba(0, 0, 0, 0) 76%),
        radial-gradient(900px 520px at 18% 8%,
          rgba(94, 232, 192, .12),
          rgba(94, 232, 192, 0) 62%),
        linear-gradient(180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(4, 22, 16, .28) 58%,
          rgba(0, 0, 0, .84) 100%);
    }

    .home-hero-text {
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      z-index: 5;
      max-width: 1280px;
      margin: 0 auto;
      padding: 64px 0 0;
      pointer-events: none;
    }
    .home-hero-eyebrow {
      font-size: var(--text-sm, 0.875rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-on-dark-secondary, #9BA9A3);
      margin-bottom: var(--space-4, 16px);
    }
    .home-hero-h1 {
      font-size: clamp(2rem, 3vw, 2.75rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--color-text-on-dark, #F4F8F5);
      max-width: 720px;
      margin-bottom: var(--space-8, 32px);
    }

    .home-stats {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 5;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 0 48px;
      display: flex;
      justify-content: flex-end;
      gap: var(--space-12, 48px);
      pointer-events: none;
    }
    .home-stat__label {
      font-size: var(--text-sm, 0.875rem);
      font-weight: 400;
      color: var(--color-text-on-dark-secondary, #9BA9A3);
      margin-bottom: var(--space-1, 4px);
    }
    .home-stat__value {
      font-size: var(--text-2xl, 2rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--color-text-on-dark, #F4F8F5);
    }
    .scroll-cue {
      position: fixed;
      left: max(32px, calc((100vw - 1280px) / 2));
      bottom: 48px;
      z-index: 5;
      font-size: var(--text-lg, 1.25rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      color: var(--color-text-on-dark-secondary, #9BA9A3);
      pointer-events: none;
    }
    .orbit-copy {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 4;
      width: min(640px, calc(100vw - 40px));
      transform: translate(-50%, -42%);
      opacity: 0;
      pointer-events: none;
      text-align: center;
      transition:
        opacity .58s var(--ease, cubic-bezier(.22,.61,.36,1)),
        transform .72s var(--ease, cubic-bezier(.22,.61,.36,1));
      will-change: opacity, transform;
    }
    .orbit-copy.is-visible {
      opacity: 1;
      transform: translate(-50%, -42%);
    }
    .orbit-copy__stat {
      text-align: center;
    }
    .orbit-copy__stat-label {
      font-size: clamp(1.125rem, 1.55vw, 1.5rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--color-text-on-dark-secondary, #9BA9A3);
      margin-bottom: 14px;
    }
    .orbit-copy__stat-value {
      font-size: clamp(3rem, 4.8vw, 5.25rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--color-text-on-dark, #F4F8F5);
    }
    .orbit-copy__stat-label,
    .orbit-copy__stat-value {
      opacity: 0;
      transform: translateY(18px);
    }
    .orbit-copy.is-visible .orbit-copy__stat-label {
      animation: rise .62s var(--ease, cubic-bezier(.22,.61,.36,1)) .06s forwards;
    }
    .orbit-copy.is-visible .orbit-copy__stat-value {
      animation: rise .68s var(--ease, cubic-bezier(.22,.61,.36,1)) .16s forwards;
    }
    /* Hidden by default — revealed after sphere forms (see WebGL loop) */
    .nav {
      opacity: 0;
      transform: translateY(-16px);
    }
    .home-hero-eyebrow,
    .home-hero-h1,
    .home-stat,
    .scroll-cue {
      opacity: 0;
      transform: translateY(22px);
    }
    .anim .nav                    { animation: rise .7s  var(--ease, cubic-bezier(.22,.61,.36,1)) 0s    forwards; }
    .anim .home-hero-eyebrow      { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .14s  forwards; }
    .anim .home-hero-h1           { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .28s  forwards; }
    .anim .scroll-cue             { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .42s  forwards; }
    .anim .home-stat:nth-child(1) { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .42s  forwards; }
    .anim .home-stat:nth-child(2) { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .54s  forwards; }

    .anim .nav,
    .anim .home-hero-eyebrow,
    .anim .home-hero-h1,
    .anim .home-stat,
    .anim .scroll-cue {
      transition:
        opacity .46s var(--ease, cubic-bezier(.22,.61,.36,1)),
        transform .58s var(--ease, cubic-bezier(.22,.61,.36,1)),
        filter .46s var(--ease, cubic-bezier(.22,.61,.36,1));
      will-change: opacity, transform, filter;
    }
    .home-ui-exiting .nav,
    .home-ui-exiting .home-hero-eyebrow,
    .home-ui-exiting .home-hero-h1,
    .home-ui-exiting .home-stat,
    .home-ui-exiting .scroll-cue {
      pointer-events: none;
      animation: none !important;
    }
    .home-ui-presented:not(.home-ui-exiting):not(.home-ui-returning) .nav,
    .home-ui-presented:not(.home-ui-exiting):not(.home-ui-returning) .home-hero-eyebrow,
    .home-ui-presented:not(.home-ui-exiting):not(.home-ui-returning) .home-hero-h1,
    .home-ui-presented:not(.home-ui-exiting):not(.home-ui-returning) .home-stat,
    .home-ui-presented:not(.home-ui-exiting):not(.home-ui-returning) .scroll-cue {
      opacity: 1;
      transform: none;
      filter: none;
      animation: none;
    }
    .home-ui-returning .nav,
    .home-ui-returning .home-hero-eyebrow,
    .home-ui-returning .home-hero-h1,
    .home-ui-returning .home-stat,
    .home-ui-returning .scroll-cue {
      opacity: 0;
    }
    .home-ui-returning .nav                    { animation: rise .7s  var(--ease, cubic-bezier(.22,.61,.36,1)) 0s    forwards !important; }
    .home-ui-returning .home-hero-eyebrow      { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .14s  forwards !important; }
    .home-ui-returning .home-hero-h1           { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .28s  forwards !important; }
    .home-ui-returning .scroll-cue             { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .42s  forwards !important; }
    .home-ui-returning .home-stat:nth-child(1) { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .42s  forwards !important; }
    .home-ui-returning .home-stat:nth-child(2) { animation: rise .85s var(--ease, cubic-bezier(.22,.61,.36,1)) .54s  forwards !important; }
    .home-ui-exiting .nav {
      animation: homeNavExit .38s var(--ease, cubic-bezier(.22,.61,.36,1)) 0s both !important;
    }
    .home-ui-exiting .home-hero-eyebrow {
      animation: homeContentExit .42s var(--ease, cubic-bezier(.22,.61,.36,1)) .04s both !important;
    }
    .home-ui-exiting .home-hero-h1 {
      animation: homeContentExit .42s var(--ease, cubic-bezier(.22,.61,.36,1)) .08s both !important;
    }
    .home-ui-exiting .scroll-cue {
      animation: homeContentExit .42s var(--ease, cubic-bezier(.22,.61,.36,1)) .12s both !important;
    }
    .home-ui-exiting .home-stat:nth-child(1) {
      animation: homeContentExit .42s var(--ease, cubic-bezier(.22,.61,.36,1)) .12s both !important;
    }
    .home-ui-exiting .home-stat:nth-child(2) {
      animation: homeContentExit .42s var(--ease, cubic-bezier(.22,.61,.36,1)) .16s both !important;
    }
    @keyframes homeNavExit {
      from { opacity: 1; transform: none; }
      to   { opacity: 0; transform: translateY(-16px); }
    }
    @keyframes homeContentExit {
      from { opacity: 1; transform: none; }
      to   { opacity: 0; transform: translateY(-22px); }
    }

    @media (max-width: 760px) {
      .home-hero-text { padding: 48px 16px 0; }
      .home-hero-h1 { font-size: clamp(1.5rem, 8vw, 2rem); }
      .home-stats { padding: 0 16px 32px; gap: var(--space-8, 32px); }
      .home-stat__value { font-size: var(--text-2xl, 2rem); }
      .scroll-cue { left: 16px; bottom: 32px; }
      .orbit-copy { transform: translate(-50%, -36%); }
      .orbit-copy.is-visible { transform: translate(-50%, -36%); }
    }
    @media (max-width: 440px) {
      .home-hero-text { padding: 32px 16px 0; }
    }
  </style>
</head>
<body>
  <div id="gl-container"></div>
  <div class="home-gradient" aria-hidden="true"></div>

  <div class="home-content" aria-hidden="true">
    <div class="bfs-title">
      <h2>Built for scale</h2>
      <p>Enterprise-grade infrastructure that<br>lets you launch in days, not months</p>

  </div>

  <div data-site-nav data-active="home"></div>
  <script src="assets/site-nav.js"></script>

  <div class="home-hero-text">
    <p class="home-hero-eyebrow">POWERING THE BEST TEAM</p>

  </div>

  <p class="scroll-cue">Scroll to explore</p>

  <div class="home-stats">
    <div class="home-stat">
      <p class="home-stat__label">Supported Countries</p>
      <p class="home-stat__value">265</p>
    </div>
    <div class="home-stat">
      <p class="home-stat__label">IPs Amounts</p>
      <p class="home-stat__value">89,723,782,097</p>
    </div>
  </div>

  <section class="orbit-copy" aria-hidden="true">
    <div class="orbit-copy__stat">
      <p class="orbit-copy__stat-label">Supported Countries</p>
      <p class="orbit-copy__stat-value">265</p>
    </div>
  </section>

  <script src="assets/home-webgl.bundle.js?v=20260623-no-cover"></script>

  <script src="assets/site-i18n.js"></script>
  <script>
    // Safety net: if WebGL stalls, force elements visible after 5s
    setTimeout(function(){
      if (document.documentElement.classList.contains('home-ui-exiting')) return;
      document.querySelectorAll('#nav,.home-hero-eyebrow,.home-hero-h1,.home-stat,.scroll-cue').forEach(function(el){
        el.style.opacity='1'; el.style.transform='none';
      });
    }, 5000);
  </script>
  <script>
    (function(){
      var nav = document.getElementById('nav');
      if (nav) {
        var onScroll = function(){ nav.classList.toggle('scrolled', window.scrollY > 12); };
        window.addEventListener('scroll', onScroll, {passive:true});
        onScroll();
      }
      var burger = document.getElementById('hamburger');
      var mnav = document.getElementById('mobileNav');
      if (burger && mnav) {
        burger.addEventListener('click', function(){
          var open = mnav.classList.toggle('open');
          burger.classList.toggle('open', open);
        });
        mnav.querySelectorAll('a').forEach(function(a){
          a.addEventListener('click', function(){
            mnav.classList.remove('open');
            burger.classList.remove('open');
          });
        });
      }
    })();
  </script>

  <!-- COBE globe (geo coverage) -->
  <script type="module">
    import createGlobe from 'https://cdn.jsdelivr.net/npm/cobe@latest/+esm';
    const globeCanvas = document.getElementById('cobe-globe');
    if (globeCanvas) {
      let globe, frame, phi = 0;
      function rotateGlobe() {
        phi += 0.003;
        if (globe) globe.update({ phi });
        frame = requestAnimationFrame(rotateGlobe);
      }
      function mountGlobe() {
        if (globe) globe.destroy();
        cancelAnimationFrame(frame);
        frame = null;
        const geoWrap = document.querySelector('.geo__globe-wrap') || globeCanvas.parentElement;
        const rect = geoWrap.getBoundingClientRect();
        const size = Math.max(320, Math.round((rect.width || 460) * 0.98));
        globeCanvas.style.width = size + 'px';
        globeCanvas.style.height = size + 'px';
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        globe = createGlobe(globeCanvas, {
          devicePixelRatio: dpr, width: size, height: size, phi, theta: 0.2,
          dark: 0, diffuse: 1.2, mapSamples: 8000, mapBrightness: 6, mapBaseBrightness: 0,
          baseColor: [1, 1, 1], markerColor: [0.1, 0.66, 0.34], glowColor: [1, 1, 1],
        });
        globe.update({ phi });
        if (visible) frame = requestAnimationFrame(rotateGlobe);
      }
      let visible = false;
      const observer = new IntersectionObserver(entries => {
        visible = entries[0].isIntersecting;
        if (visible && !frame) frame = requestAnimationFrame(rotateGlobe);
        if (!visible) { cancelAnimationFrame(frame); frame = null; }
      }, { threshold: 0 });
      observer.observe(globeCanvas);
      mountGlobe();
      window.addEventListener('resize', mountGlobe, { passive: true });
    }
  </script>

  <!-- Light rays WebGL (compliance section) -->
  <script type="module">
    import { Renderer, Program, Triangle, Mesh } from 'https://esm.sh/ogl';
    const hexToRgb = hex => {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return m ? [parseInt(m[1],16)/255, parseInt(m[2],16)/255, parseInt(m[3],16)/255] : [1,1,1];
    };
    const getAnchorAndDir = (origin, w, h) => {
      const o = 0.2;
      switch(origin) {
        case 'top-left':      return { anchor:[0,-o*h],       dir:[0,1] };
        case 'top-right':     return { anchor:[w,-o*h],       dir:[0,1] };
        case 'left':          return { anchor:[-o*w,.5*h],    dir:[1,0] };
        case 'right':         return { anchor:[(1+o)*w,.5*h], dir:[-1,0] };
        case 'bottom-left':   return { anchor:[0,(1+o)*h],    dir:[0,-1] };
        case 'bottom-center': return { anchor:[.5*w,(1+o)*h], dir:[0,-1] };
        case 'bottom-right':  return { anchor:[w,(1+o)*h],    dir:[0,-1] };
        default:              return { anchor:[.5*w,-o*h],    dir:[0,1] };
      }
    };
    const container = document.getElementById('light-rays-bg');
    if (container) {
      const raysOrigin = 'top-center', raysColor = '#ffffff', raysSpeed = 1;
      const lightSpread = 2.5, rayLength = 4;
      const pulsating = false, fadeDistance = 1.5, saturation = 1.0;
      const mouseInfluence = 0.0, noiseAmount = 0.0, distortion = 0.0;
      const mouse = { x:.5, y:.5 }, smoothMouse = { x:.5, y:.5 };
      const renderer = new Renderer({ dpr: Math.min(window.devicePixelRatio,2), alpha:true });
      const gl = renderer.gl;
      gl.canvas.style.width = '100%';
      gl.canvas.style.height = '100%';
      container.appendChild(gl.canvas);
      const vert = 'attribute vec2 position;varying vec2 vUv;void main(){vUv=position*.5+.5;gl_Position=vec4(position,0.,1.);}';
      const frag = 'precision highp float;uniform float iTime;uniform vec2 iResolution;uniform vec2 rayPos;uniform vec2 rayDir;uniform vec3 raysColor;uniform float raysSpeed;uniform float lightSpread;uniform float rayLength;uniform float pulsating;uniform float fadeDistance;uniform float saturation;uniform vec2 mousePos;uniform float mouseInfluence;uniform float noiseAmount;uniform float distortion;varying vec2 vUv;float noise(vec2 st){return fract(sin(dot(st.xy,vec2(12.9898,78.233)))*43758.5453123);}float rayStrength(vec2 src,vec2 refDir,vec2 coord,float sA,float sB,float spd){vec2 s2c=coord-src;vec2 dn=normalize(s2c);float ca=dot(dn,refDir);float da=ca+distortion*sin(iTime*2.+length(s2c)*.01)*.2;float sf=pow(max(da,0.),1./max(lightSpread,.001));float dist=length(s2c);float mx=iResolution.x*rayLength;float lf=clamp((mx-dist)/mx,0.,1.);float ff=clamp((iResolution.x*fadeDistance-dist)/(iResolution.x*fadeDistance),.5,1.);float pulse=pulsating>.5?(0.8+0.2*sin(iTime*spd*3.)):1.;float bs=clamp((0.45+0.15*sin(da*sA+iTime*spd))+(0.3+0.2*cos(-da*sB+iTime*spd)),0.,1.);return bs*lf*ff*sf*pulse;}void mainImage(out vec4 fc,in vec2 fragCoord){vec2 coord=vec2(fragCoord.x,iResolution.y-fragCoord.y);vec2 frd=rayDir;if(mouseInfluence>0.){vec2 mp=mousePos*iResolution.xy;vec2 md=normalize(mp-rayPos);frd=normalize(mix(rayDir,md,mouseInfluence));}vec4 r1=vec4(1.)*rayStrength(rayPos,frd,coord,36.2214,21.11349,1.5*raysSpeed);vec4 r2=vec4(1.)*rayStrength(rayPos,frd,coord,22.3991,18.0234,1.1*raysSpeed);fc=r1*.5+r2*.4;if(noiseAmount>0.){float n=noise(coord*.01+iTime*.1);fc.rgb*=(1.-noiseAmount+noiseAmount*n);}float bright=1.-(coord.y/iResolution.y);fc.x*=0.1+bright*.8;fc.y*=0.3+bright*.6;fc.z*=0.5+bright*.5;if(saturation!=1.){float g=dot(fc.rgb,vec3(0.299,0.587,0.114));fc.rgb=mix(vec3(g),fc.rgb,saturation);}fc.rgb*=raysColor;}void main(){vec4 c;mainImage(c,gl_FragCoord.xy);gl_FragColor=c;}';
      const uniforms = {
        iTime:{value:0},iResolution:{value:[1,1]},rayPos:{value:[0,0]},rayDir:{value:[0,1]},
        raysColor:{value:hexToRgb(raysColor)},raysSpeed:{value:raysSpeed},lightSpread:{value:lightSpread},
        rayLength:{value:rayLength},pulsating:{value:pulsating?1.0:0.0},fadeDistance:{value:fadeDistance},
        saturation:{value:saturation},mousePos:{value:[.5,.5]},mouseInfluence:{value:mouseInfluence},
        noiseAmount:{value:noiseAmount},distortion:{value:distortion}
      };
      const geometry = new Triangle(gl);
      const program = new Program(gl, { vertex:vert, fragment:frag, uniforms });
      const mesh = new Mesh(gl, { geometry, program });
      const updateSize = () => {
        renderer.dpr = Math.min(window.devicePixelRatio,2);
        const w = container.clientWidth, h = container.clientHeight;
        renderer.setSize(w,h);
        const dpr = renderer.dpr;
        uniforms.iResolution.value = [w*dpr, h*dpr];
        const {anchor,dir} = getAnchorAndDir(raysOrigin, w*dpr, h*dpr);
        uniforms.rayPos.value = anchor;
        uniforms.rayDir.value = dir;
      };
      const loop = t => {
        uniforms.iTime.value = t * 0.001;
        const s = 0.92;
        smoothMouse.x = smoothMouse.x*s + mouse.x*(1-s);
        smoothMouse.y = smoothMouse.y*s + mouse.y*(1-s);
        uniforms.mousePos.value = [smoothMouse.x, smoothMouse.y];
        renderer.render({ scene: mesh });
        requestAnimationFrame(loop);
      };
      window.addEventListener('resize', updateSize);
      window.addEventListener('mousemove', e => {
        const r = container.getBoundingClientRect();
        mouse.x = (e.clientX-r.left)/r.width;
        mouse.y = (e.clientY-r.top)/r.height;
      });
      updateSize();
      requestAnimationFrame(loop);
    }
  </script>
